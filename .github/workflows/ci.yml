name: DevOps CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Run hello.py
        run: python hello.py

      - name: Grant Execute Permission
        run: chmod +x ./scripts/sysinfo.sh

      - name: Test Linux Script
        run: ./scripts/sysinfo.sh